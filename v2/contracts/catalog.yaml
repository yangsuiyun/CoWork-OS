# Event catalog: the authoritative index of event types.
# Each entry maps an event type to its payload schema, current version, the
# command that produces it, and the aggregate stream it belongs to.
#
# Contract tests assert:
#   - every command produces a catalogued event;
#   - every business event schema under events/ is listed here (no orphans),
#     EXCLUDING meta schemas: _envelope.schema.json (underscore-prefixed) and
#     ../capability.schema.json are not events and are not catalogued.
#
# Scope: the Task, Workspace, and ApprovalRequest aggregates are catalogued.
# OrchestrationGraph and ExternalAgentSession (spec 7.2) are added later.
#
# Decision (approval modeling): ApprovalRequested/Resolved graduated out of the
# task stream into a standalone ApprovalRequest aggregate (approval:<id>), so
# approvals have an independent lifecycle and a single authoritative source.
# The projector cross-updates rm_tasks.status by taskId on these events.

version: 0.1.0

aggregates:
  task:
    streamPrefix: "task:"
    events:
      - type: TaskCreated
        schemaVer: 1
        schema: events/task-created.schema.json
        producedBy: CreateTask
      - type: TaskPlanned
        schemaVer: 1
        schema: events/task-planned.schema.json
        producedBy: PlanTask
      - type: TurnStarted
        schemaVer: 1
        schema: events/turn-started.schema.json
        producedBy: StartTurn
      - type: TurnCompleted
        schemaVer: 1
        schema: events/turn-completed.schema.json
        producedBy: StartTurn
      - type: ArtifactCreated
        schemaVer: 1
        schema: events/artifact-created.schema.json
        producedBy: AppendArtifact
      - type: TaskCompleted
        schemaVer: 1
        schema: events/task-completed.schema.json
        producedBy: CompleteTask
      - type: TaskFailed
        schemaVer: 1
        schema: events/task-failed.schema.json
        producedBy: FailTask
      - type: TaskCancelled
        schemaVer: 1
        schema: events/task-cancelled.schema.json
        producedBy: CancelTask

  workspace:
    streamPrefix: "workspace:"
    events:
      - type: WorkspaceCreated
        schemaVer: 1
        schema: events/workspace-created.schema.json
        producedBy: CreateWorkspace
      - type: PermissionsChanged
        schemaVer: 1
        schema: events/permissions-changed.schema.json
        producedBy: UpdatePermissions

  approval:
    streamPrefix: "approval:"
    events:
      - type: ApprovalRequested
        schemaVer: 1
        schema: events/approval-requested.schema.json
        producedBy: RequestApproval
      - type: ApprovalResolved
        schemaVer: 1
        schema: events/approval-resolved.schema.json
        producedBy: ApproveApproval, RejectApproval
